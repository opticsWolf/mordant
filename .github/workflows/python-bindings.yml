name: Python Bindings

on:
  push:
    branches: [main, master]
    paths:
      - "rushdown-py/**"
      - "src/**"
      - "Cargo.toml"
  pull_request:
    branches: [main, master]
    paths:
      - "rushdown-py/**"
      - "src/**"
      - "Cargo.toml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: |
          pip install maturin
          cd rushdown-py
          maturin build --release
      - name: Install wheel
        run: |
          pip install rushdown-py/target/wheels/rushdown_py-*.whl
      - name: Test
        run: |
          pip install pytest
          python -c "import rushdown; print(rushdown.markdown_to_html('# Hello'))"
